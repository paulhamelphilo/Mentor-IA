                if (mainNav) mainNav.style.display = 'none';
                toggleArgumentationMode(false);
            } else {
                if (state.mode === 'argumentation') {
                    state.mode = 'intro';
                }
                if (mainNav) mainNav.style.display = 'flex';
            }
            render();
        }

        function populateExplicTextSelector() {
            const sel = document.getElementById('select-explic-text');
            if (!sel) return;
            sel.innerHTML = '<option value="">-- Sélectionnez un texte --</option>' +
                state.explicTexts.map((t, i) => `<option value="${i}">${t.label}</option>`).join('');
            sel.value = state.currentExplicTextIndex !== null ? state.currentExplicTextIndex : '';
        }

        function loadExplicationsFromJSON(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    state.explicTexts = JSON.parse(evt.target.result);
                    state.currentExplicTextIndex = null;
                    state.currentExplicText = null;
                    populateExplicTextSelector();
                    console.log(`✓ ${state.explicTexts.length} texte(s) chargé(s)`);
                } catch (err) {
                    alert('Erreur lors de la lecture du JSON : ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function selectExplicText(val) {
            const idx = parseInt(val, 10);
            if (isNaN(idx) || idx < 0 || idx >= state.explicTexts.length) {
                state.currentExplicTextIndex = null;
                state.currentExplicText = null;
            } else {
                state.currentExplicTextIndex = idx;
                state.currentExplicText = state.explicTexts[idx];
            }
            render();
        }

        function toggleDissertationMode(isCustom) {
            state.isCustomDissertation = isCustom;
            document.getElementById('dissertation-predefined').style.display = isCustom ? 'none' : 'block';
            document.getElementById('dissertation-custom').style.display = isCustom ? 'block' : 'none';
            if (!isCustom) {
                document.getElementById('input-custom-sujet').value = '';
            }
            render();
        }

        function toggleExplicationMode(isCustom) {
            state.isCustomExplication = isCustom;
            document.getElementById('explication-predefined').style.display = isCustom ? 'none' : 'block';
            document.getElementById('explication-custom').style.display = isCustom ? 'block' : 'none';
            if (!isCustom) {
                document.getElementById('input-custom-author').value = '';
                document.getElementById('input-custom-work').value = '';
                document.getElementById('textarea-custom-text').value = '';
                selectExplicText(document.getElementById('select-explic-text').value);
            } else {
                updateCustomExplication();
            }
            render();
        }

        function updateCustomExplication() {
            const author = document.getElementById("input-custom-author").value.trim();
            const work = document.getElementById("input-custom-work").value.trim();
            const text = document.getElementById("textarea-custom-text").value.trim();

            if (!text) {
                state.currentExplicText = null;
            } else {
                let htmlContent = "";
                if (author || work) {
                    htmlContent += `<h3>${author || ''}${author && work ? ', ' : ''}<em>${work || ''}</em></h3>`;
                }
                htmlContent += `<p>${text.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>')}</p>`;
                state.currentExplicText = {
                    author,
                    work,
                    label: (author && work) ? `${author}, ${work}` : (author || work || "Texte personnalisé"),
                    html: htmlContent
                };
            }
            render();
        }

        function toggleHelp() {
            preserveTrainingText();
            state.showHelp = !state.showHelp;
            render();
        }

        function resetTraining() {
            if (state.exerciseType === 'dissertation') {
                state.training.dissertation[state.mode] = content[state.mode].trainingTemplate;
                state.corrections.dissertation[state.mode] = null;
            } else if (state.exerciseType === 'explication') {
                state.training.explic[state.mode] = content.explic[state.mode].trainingTemplate;
                state.corrections.explic[state.mode] = null;
            } else if (state.exerciseType === 'argumentation') {
                state.training.argumentation.argumentation = content.argumentation.trainingTemplate;
                state.corrections.argumentation.argumentation = null;
            }
            render();
        }

        function getCharCountInfo(len, max) {
            let label = `${len} / ${max} caractères`;
            let color = '#7f8c8d';
            let fontWeight = 'normal';

            if (len >= max) {
                label += ' 🚫 (limite atteinte)';
                color = '#0f4c81';
                fontWeight = 'bold';
            } else if (len >= max * 0.9) {
                label += ' ⚠️ (limite presque atteinte)';
                color = '#d35400';
                fontWeight = 'bold';
            }

            return { label, color, fontWeight };
        }

        function updateCharCount(textarea) {
            const counter = document.getElementById('char-count');
            if (counter) {
                const info = getCharCountInfo(textarea.value.length, textarea.maxLength);
                counter.textContent = info.label;
                counter.style.color = info.color;
                counter.style.fontWeight = info.fontWeight;
            }
        }

        function preserveAndCount(textarea) {
            if (state.exerciseType === 'dissertation') {
                state.training.dissertation[state.mode] = textarea.value;
            } else if (state.exerciseType === 'explication') {
                state.training.explic[state.mode] = textarea.value;
            } else if (state.exerciseType === 'argumentation') {
                state.training.argumentation.argumentation = textarea.value;
            }
            updateCharCount(textarea);
        }

        function render() {
            // exercise type buttons
            document.getElementById('btn-ex-type-dis').classList.toggle('active', state.exerciseType === 'dissertation');
            document.getElementById('btn-ex-type-exp').classList.toggle('active', state.exerciseType === 'explication');
            document.getElementById('btn-ex-type-arg').classList.toggle('active', state.exerciseType === 'argumentation');

            document.querySelectorAll('.main-nav .btn').forEach(b => b.classList.toggle('active', b.id === (state.mode === 'intro' ? 'btn-mode-intro' : 'btn-mode-dev')));

            // Toggle wide container based on help state
            const container = document.querySelector('.container');
            if (container) {
                container.classList.toggle('wide', state.showHelp);
            }

            if (state.exerciseType === 'explication') {
                populateExplicTextSelector();
            }

            const area = document.getElementById('content-area');

            const maxLength = state.exerciseType === 'argumentation' ? 3000 : (state.mode === 'intro' ? 3000 : 12000);
            let currentText = '';
            let savedCorrectionObj = null;
            if (state.exerciseType === 'dissertation') {
                currentText = state.training.dissertation[state.mode] || '';
                savedCorrectionObj = state.corrections.dissertation[state.mode];
            } else if (state.exerciseType === 'explication') {
                currentText = state.training.explic[state.mode] || '';
                savedCorrectionObj = state.corrections.explic[state.mode];
            } else if (state.exerciseType === 'argumentation') {
                currentText = state.training.argumentation.argumentation || '';
                savedCorrectionObj = state.corrections.argumentation.argumentation;
            }

            const sujetActif = obtenirSujetActif();
            let savedCorrection = null;
            if (savedCorrectionObj && savedCorrectionObj.sujet === sujetActif && sujetActif !== '') {
                savedCorrection = savedCorrectionObj.html;
            }
            const currentLength = currentText.length;
            const charInfo = getCharCountInfo(currentLength, maxLength);

            let exerciseTitle = '';
            if (state.exerciseType === 'dissertation') {
                exerciseTitle = state.mode === 'intro'
                    ? "Entraînement à l’introduction de la dissertation"
                    : "Entraînement au développement de la dissertation";
            } else if (state.exerciseType === 'explication') {
                exerciseTitle = state.mode === 'intro'
                    ? "Entraînement à l’introduction de l’explication de texte"
                    : "Entraînement au développement de l’explication de texte";
            } else if (state.exerciseType === 'argumentation') {
                exerciseTitle = "Entraînement à l’argumentation";
            }

            let workspaceHtml = `
                <div class="workspace-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="margin: 0;">${exerciseTitle}</h2>
                    <button class="btn btn-help ${state.showHelp ? 'active' : ''}" onclick="toggleHelp()">
                        💡 Aide méthodologique
                    </button>
                </div>
            `;

            // If explication de texte, show the text block first
            if (state.exerciseType === 'explication') {
                if (state.currentExplicText) {
                    workspaceHtml += `
                        <div class="texte-philo" style="margin-top:12px; margin-bottom: 15px; padding:15px; background:#fafafa; border:1px solid #ddd; border-radius:6px; line-height:1.8;">
                            ${state.currentExplicText.html}
                        </div>
                    `;
                }
            }

            // Workspace split layout
            workspaceHtml += `
                <div class="workspace-layout">
                    <div class="editor-column">
                        <div class="form-group">
                            <label>Rédigez sans enlever les balises ci-dessous</label>
                            <textarea id="training-textarea" rows="18" maxlength="${maxLength}" oninput="preserveAndCount(this)">${currentText}</textarea>
                            <div id="char-count" style="text-align: right; font-size: 13px; color: ${charInfo.color}; font-weight: ${charInfo.fontWeight}; margin-top: 5px;">${charInfo.label}</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
                            <button class="btn btn-submit" onclick="envoyerCorrection()">Correction IA</button>
                            <button class="btn btn-secondary" onclick="resetTraining()">Remise à zéro</button>
                        </div>
                        <div id="loading-msg" class="loading">Le correcteur IA analyse votre travail selon la méthodologie de votre professeur, veuillez patienter (environ 5 à 10 secondes)...</div>
                        <div id="correction-box" style="${savedCorrection ? 'display: block;' : 'display: none;'}">
                            <h2>Analyse personnalisée</h2>
                            <div id="correction-text">${savedCorrection || ''}</div>
                        </div>
                    </div>
            `;

            // If help is active, render the help column
            if (state.showHelp) {
                let helpContent = '';
                if (state.exerciseType === 'dissertation') {
                    helpContent = content[state.mode].methodo;
                } else if (state.exerciseType === 'explication') {
                    helpContent = content.explic[state.mode].methodo;
                } else if (state.exerciseType === 'argumentation') {
                    helpContent = content.argumentation.methodo;
                }
                workspaceHtml += `
                    <div class="help-column">
                        ${helpContent}
                    </div>
                `;
            }

            workspaceHtml += `</div>`; // Close workspace-layout

            area.innerHTML = workspaceHtml;
        }

        async function envoyerCorrection() {
            let sujet = '';
            let selectedTextHtml = null;
            let selectedTextTitle = null;
            let thesisOrientation = null;
            let positionTexte = null;

            if (state.exerciseType === 'dissertation') {
                if (state.isCustomDissertation) {
                    sujet = document.getElementById("input-custom-sujet").value.trim();
                    if (!sujet) {
                        alert("Veuillez saisir votre sujet personnalisé avant de demander la correction.");
                        return;
                    }
                } else {
                    sujet = document.getElementById("select-sujet").value;
                    if (!sujet) {
                        alert("Veuillez sélectionner un sujet avant de demander la correction.");
                        return;
                    }
                }
            } else if (state.exerciseType === 'explication') {
                // Explication de texte
                if (!state.currentExplicText) {
                    if (state.isCustomExplication) {
                        alert("Veuillez saisir le texte à expliquer avant de demander la correction.");
                    } else {
                        alert("Veuillez sélectionner un texte en haut de la page avant de demander la correction.");
                    }
                    return;
                }
                selectedTextHtml = state.currentExplicText.html;
                selectedTextTitle = state.currentExplicText.label || state.currentExplicText.title;
            } else if (state.exerciseType === 'argumentation') {
                if (!state.activeThesis) {
                    alert("Veuillez choisir ou saisir une thèse à défendre avant de demander la correction.");
                    return;
                }
                thesisOrientation = state.thesisOrientation;
                positionTexte = state.activeThesis;
                if (!state.isCustomArgumentation) {
                    const notion = document.getElementById("select-notion-arg").value;
                    const idx = parseInt(document.getElementById("select-sujet-arg").value, 10);
                    if (notion && !isNaN(idx)) {
                        sujet = sujetsPhilo[notion][idx].question;
                    }
                } else {
                    sujet = "Thèse personnalisée";
                }
            }

            let trainingText = document.getElementById("training-textarea") ? document.getElementById("training-textarea").value.trim() : '';
            if (!trainingText) {
                alert("Veuillez rédiger votre texte d’entraînement avant d’envoyer.");
                return;
            }

            const cleanTextForValidation = trainingText.replace(/\[[^\]]+\]/g, '').trim();
            if (cleanTextForValidation.length < 10) {
                alert("Veuillez rédiger votre travail avant de demander la correction.");
                return;
            }

            const sujetActif = obtenirSujetActif();
            let savedCorrectionObj = null;
            if (state.exerciseType === 'dissertation') {
                savedCorrectionObj = state.corrections.dissertation[state.mode];
            } else if (state.exerciseType === 'explication') {
                savedCorrectionObj = state.corrections.explic[state.mode];
            } else if (state.exerciseType === 'argumentation') {
                savedCorrectionObj = state.corrections.argumentation.argumentation;
            }

            let pistesPrecedentes = {};
            if (savedCorrectionObj && savedCorrectionObj.sujet === sujetActif && sujetActif !== '') {
                pistesPrecedentes = extrairePistesParBalise(savedCorrectionObj.html);
            }

            // ==========================================
            // 🛠️ ÉTAPE 1 : RETOUR VISUEL ET SÉCURISATION DU BOUTON
            // ==========================================
            const btnSubmit = document.querySelector(".btn-submit");
            if (btnSubmit) {
                btnSubmit.disabled = true;          // Bloque les clics frénétiques
                btnSubmit.innerText = "⏳ Analyse en cours..."; // Indique que l'IA travaille
                btnSubmit.style.opacity = "0.6";    // Grise légèrement le bouton
                btnSubmit.style.cursor = "not-allowed";
            }

            document.getElementById("loading-msg").style.display = "block";
            document.getElementById("correction-box").style.display = "none";

            try {
                const body = {
                    sujet,
                    type: state.exerciseType,
                    mode: state.mode,
                    texte: trainingText,
                    pistesPrecedentes
                };
                if (state.exerciseType === 'explication') {
                    body.selectedTextTitle = selectedTextTitle;
                    body.selectedTextHtml = selectedTextHtml;
                }
                if (state.exerciseType === 'argumentation') {
                    body.thesisOrientation = thesisOrientation;
                    body.positionTexte = positionTexte;
                }

                const response = await fetch(CLOUD_FUNCTION_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept-Encoding": "identity" // 🚀 Force l'envoi immédiat mot par mot sans attendre
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) throw new Error("Le serveur a rencontré un problème.");

                // Configuration pour lire le flux progressif
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                // Vider et afficher la boîte de correction dès le début
                document.getElementById("correction-text").innerHTML = "";
                document.getElementById("correction-box").style.display = "block";
                document.getElementById("correction-box").scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });

                let texteCumule = "";

                // Boucle de lecture du flux en temps réel
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break; // Fin du flux

                    // Convertir le morceau de binaire en texte et l'ajouter
                    const chunk = decoder.decode(value, { stream: true });
                    texteCumule += chunk;

                    // Mettre à jour l'affichage Markdown à la volée grâce à marked
                    document.getElementById("correction-text").innerHTML = marked.parse(texteCumule);
                }

                // Sauvegarder la correction finale dans le state de l'application
                const correctionHtmlFinale = marked.parse(texteCumule);
                const newCorrectionObj = {
                    sujet: sujetActif,
                    html: correctionHtmlFinale
                };
                if (state.exerciseType === 'dissertation') {
                    state.corrections.dissertation[state.mode] = newCorrectionObj;
                } else if (state.exerciseType === 'explication') {
                    state.corrections.explic[state.mode] = newCorrectionObj;
                } else if (state.exerciseType === 'argumentation') {
                    state.corrections.argumentation.argumentation = newCorrectionObj;
                }
            } catch (error) {
                alert("Erreur lors de la communication avec le correcteur : " + error.message);
            } finally {
                document.getElementById("loading-msg").style.display = "none";

                // ==========================================
                // 🛠️ ÉTAPE 2 : RÉACTIVATION OBLIGATOIRE DU BOUTON (MÊME SI BUG)
                // ==========================================
                if (btnSubmit) {
                    btnSubmit.disabled = false;         // Le bouton redevient cliquable
                    btnSubmit.innerText = "Correction IA"; // Reprend son texte d'origine
                    btnSubmit.style.opacity = "1";       // Reprend son opacité normale
                    btnSubmit.style.cursor = "pointer";
                }
            }
        }

        function updateSujetsArg() {
            const notion = document.getElementById("select-notion-arg").value;
            const selectSujet = document.getElementById("select-sujet-arg");
            selectSujet.innerHTML = '<option value="">-- Sélectionnez un sujet --</option>';

            // Hide buttons and clear selection state since the notion changed
            document.getElementById('btn-arg-thesis').style.display = 'none';
            document.getElementById('btn-arg-antithesis').style.display = 'none';
            state.activeThesis = null;
            state.thesisOrientation = null;
            updateDisplaySelectedThesis();

            if (notion) {
                selectSujet.disabled = false;
                selectSujet.innerHTML = '<option value="">-- Sélectionnez un sujet d’étude --</option>';
                sujetsPhilo[notion].forEach((s, idx) => {
                    const opt = document.createElement("option");
                    opt.value = idx;
                    opt.textContent = s.question;
                    selectSujet.appendChild(opt);
                });
            } else {
                selectSujet.disabled = true;
            }
            render();
        }

        function updateArgThesisButtons() {
            const notion = document.getElementById("select-notion-arg").value;
            const idx = parseInt(document.getElementById("select-sujet-arg").value, 10);

            const btnThesis = document.getElementById('btn-arg-thesis');
            const btnAntithesis = document.getElementById('btn-arg-antithesis');

            if (notion && !isNaN(idx)) {
                const subject = sujetsPhilo[notion][idx];

                btnThesis.textContent = subject.thesis;
                btnAntithesis.textContent = subject.antithesis;

                btnThesis.style.display = 'block';
                btnAntithesis.style.display = 'block';

                // Clear active button styles
                btnThesis.classList.remove('active');
                btnAntithesis.classList.remove('active');
            } else {
                btnThesis.style.display = 'none';
                btnAntithesis.style.display = 'none';
            }
            // Clear current selection since subject changed
            state.activeThesis = null;
            state.thesisOrientation = null;
            updateDisplaySelectedThesis();
            render();
        }

        function selectArgPosition(orientation) {
            const notion = document.getElementById("select-notion-arg").value;
            const idx = parseInt(document.getElementById("select-sujet-arg").value, 10);
            if (!notion || isNaN(idx)) return;

            const subject = sujetsPhilo[notion][idx];
            state.thesisOrientation = orientation;
            state.activeThesis = orientation === 'thesis' ? subject.thesis : subject.antithesis;

            // Toggle active classes on buttons
            document.getElementById('btn-arg-thesis').classList.toggle('active', orientation === 'thesis');
            document.getElementById('btn-arg-antithesis').classList.toggle('active', orientation === 'antithesis');

            updateDisplaySelectedThesis();
            render();
        }

        function updateCustomArgPosition() {
            const text = document.getElementById("input-custom-thesis").value.trim();
            if (text) {
                state.activeThesis = text;
                state.thesisOrientation = 'custom';
            } else {
                state.activeThesis = null;
                state.thesisOrientation = null;
            }
            updateDisplaySelectedThesis();
            render();
        }

        function toggleArgumentationMode(isCustom) {
            state.isCustomArgumentation = isCustom;
            document.getElementById('argumentation-predefined').style.display = isCustom ? 'none' : 'block';
            document.getElementById('argumentation-custom').style.display = isCustom ? 'block' : 'none';

            if (isCustom) {
                // Switch to custom: read from input
                updateCustomArgPosition();
            } else {
                // Switch to predefined list: reset input and update from active button
                document.getElementById('input-custom-thesis').value = '';
                const btnThesis = document.getElementById('btn-arg-thesis');
                const btnAntithesis = document.getElementById('btn-arg-antithesis');
                if (btnThesis.classList.contains('active')) {
                    selectArgPosition('thesis');
                } else if (btnAntithesis.classList.contains('active')) {
                    selectArgPosition('antithesis');
                } else {
                    state.activeThesis = null;
                    state.thesisOrientation = null;
                    updateDisplaySelectedThesis();
                }
            }
            render();
        }

        function updateDisplaySelectedThesis() {
            const display = document.getElementById('display-selected-thesis');
            if (state.activeThesis) {
                const prefix = "<strong>Position à défendre :</strong> ";
                display.innerHTML = prefix + state.activeThesis;
                display.style.display = 'block';
            } else {
                display.innerHTML = '';
                display.style.display = 'none';
            }
        }
    </script>

    <div class="footer-credit">PH-2026</div>
